name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy_stage:
    name: Entrega Contínua (CD) - Ambiente de Stage
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build da Imagem Docker para Stage
        run: docker build -t task-manager-stage .

      - name: Deploy no Ambiente de Stage (Simulado)
        run: docker run -d -p 8080:5000 --name app-stage task-manager-stage

      - name: Aguardar o ambiente de Stage estabilizar
        run: sleep 5

      - name: Testes de Segurança (DAST) no Stage com OWASP ZAP
        continue-on-error: true
        run: docker run --network host -t zaproxy/zap-stable zap-baseline.py -t http://localhost:8080

  deploy_aws:
    name: CD - Deploy na AWS
    needs: deploy_stage 
    runs-on: ubuntu-latest
    steps:
      - name: Testar Conexão SSH e Verificar Ambiente
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Conexão SSH estabelecida com sucesso na AWS!"
            echo "Informações do Sistema:"
            uname -a
            echo "Verificando se o Docker está instalado:"
            docker --version || echo "Atenção: Docker ainda não está instalado nesta máquina."