name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy_stage:
    name: Entrega Contínua (CD) - Ambiente de Stage
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build da Imagem Docker para Stage
        run: docker build -t task-manager-stage .

      - name: Deploy no Ambiente de Stage (Simulado)
        run: docker run -d -p 8080:5000 --name app-stage task-manager-stage

      - name: Aguardar o ambiente de Stage estabilizar
        run: sleep 5

      - name: Testes de Segurança (DAST) no Stage com OWASP ZAP
        continue-on-error: true
        run: docker run --network host -t zaproxy/zap-stable zap-baseline.py -t http://localhost:8080

  deploy_aws:
    name: CD - Deploy na AWS
    needs: deploy_stage 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Transferir arquivos para a EC2 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USER }}/task-manager"

      - name: Build e Deploy da Aplicação na AWS (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Navegando até a pasta do projeto..."
            cd /home/${{ secrets.EC2_USER }}/task-manager
            
            echo "Construindo a nova imagem Docker localmente na EC2..."
            docker build -t task-manager-prod .
            
            echo "Parando e removendo o container antigo (se existir)..."
            # O comando || true evita que o pipeline quebre na primeira vez, quando o container ainda não existe
            docker stop app-prod || true
            docker rm app-prod || true
            
            echo "Subindo o novo container em produção na porta 80!"
            # Mapeamos para a porta 80 para você acessar direto pelo IP no navegador
            docker run -d -p 80:5000 --name app-prod task-manager-prod
            
            echo "Deploy concluído com sucesso!"