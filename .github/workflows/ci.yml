name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    name: Tests and Security Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          # Instalando as ferramentas de segurança da Etapa 4
          pip install bandit safety

      - name: Run unit tests with coverage
        run: pytest --cov-report=xml
      
      ## Analise Estatica com o Bandit no código da aplicação
      
      - name: Análise de Segurança Estática com Bandit
        continue-on-error: true
        run: bandit -r . -ll -ii
       
      - name: Análise de Dependências (Safety)
        continue-on-error: true
        run: safety check -r requirements.txt
        
      ## Analise Dinamica com o Owasp Zap na aplicação

      - name: Build da Imagem Docker
        run: docker build -t task-manager-app .

      - name: Subir a Aplicação em Background
        run: docker run -d -p 5000:5000 --name app-container task-manager-app

      - name: Aguardar o Flask iniciar
        run: sleep 5

      - name: Análise Dinâmica de Segurança (DAST com OWASP ZAP)
        continue-on-error: true
        run: docker run --network host -t owasp/zap2docker-stable zap-baseline.py -t http://localhost:5000
